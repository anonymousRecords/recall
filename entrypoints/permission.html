<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../public/logo.png">
  <title>Recall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #fff;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .logo-group {
      display: flex;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo-group img {
      width: 120px;
      height: 120px;
      animation: wave 2.4s ease-in-out infinite;
    }

    .logo-group img:nth-child(1) {
      margin-right: -65px;
      animation-delay: 0s;
    }

    .logo-group img:nth-child(2) {
      margin-right: -65px;
      animation-delay: 0.3s;
      z-index: 1;
    }

    .logo-group img:nth-child(3) {
      animation-delay: 0.6s;
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    #requestBtn {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #222;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #requestBtn:hover { background: #444; }
    #requestBtn:disabled { background: #999; cursor: default; }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="logo-group">
    <img src="../public/logo-icon.png" alt="logo" />
    <img src="../public/logo-icon.png" alt="logo" />
    <img src="../public/logo-icon.png" alt="logo" />
  </div>
  <button id="requestBtn">마이크 권한 허용</button>
  <div id="status"></div>

  <script>
    const btn = document.getElementById('requestBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = '';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        for (const track of stream.getTracks()) track.stop();

        status.textContent = '마이크 권한이 허용되었습니다.';
        btn.textContent = '완료';

        setTimeout(() => {
          window.close();
        }, 2000);
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          status.textContent = '권한이 거부되었습니다.';
        } else if (err.name === 'NotFoundError') {
          status.textContent = '마이크를 찾을 수 없습니다.';
        } else {
          status.textContent = `오류: ${err.message}`;
        }
        btn.disabled = false;
        btn.textContent = '다시 시도';
      }
    });
  </script>
</body>
</html>
