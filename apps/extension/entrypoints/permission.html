<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../public/logo.png">
  <title>Recall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #1e1e1e;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .terminal {
      width: 360px;
      border: 1px solid #3e3e42;
      background: #252526;
    }

    .terminal-header {
      border-bottom: 1px solid #3e3e42;
      padding: 10px 14px;
    }

    .terminal-header .comment {
      font-size: 11px;
      color: #858585;
    }

    .terminal-header .subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: #dcdcaa;
    }

    .terminal-body {
      padding: 16px 14px;
    }

    .line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: #858585;
      line-height: 1.6;
    }

    .line .prompt {
      color: #569cd6;
      flex-shrink: 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #3e3e42;
      margin: 14px 0;
    }

    #requestBtn {
      width: 100%;
      padding: 8px 0;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      color: #858585;
      background: transparent;
      border: 1px solid #3e3e42;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #requestBtn:hover:not(:disabled) {
      border-color: #525252;
      color: #d4d4d4;
    }

    #requestBtn:disabled {
      color: #525252;
      border-color: #3e3e42;
      cursor: default;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #858585;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status .status-icon {
      color: #569cd6;
    }

    #status.success .status-icon { color: #4ec9b0; }
    #status.error .status-icon { color: #f44747; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cursor {
      display: inline-block;
      animation: blink 1s step-start infinite;
      color: #d4d4d4;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <p class="comment">// mic permissions</p>
      <p class="subtitle">$ recall --request-access audio</p>
    </div>
    <div class="terminal-body">
      <div class="line">
        <span class="prompt">&gt;</span>
        <span>인터뷰 녹음을 위해 마이크 접근 권한이 필요해요</span>
      </div>
      <div class="line" style="margin-top: 4px;">
        <span class="prompt">&gt;</span>
        <span>버튼 클릭 후 브라우저 팝업에서 <span style="color: #d4d4d4;">허용</span>을 선택해주세요</span>
      </div>
      <hr class="divider" />
      <button id="requestBtn">[ request mic access ]</button>
      <div id="status"></div>
    </div>
  </div>

  <script type="module">
    const btn = document.getElementById('requestBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.className = '';
      status.innerHTML = '<span class="status-icon">&gt;</span> <span>requesting...<span class="cursor">█</span></span>';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        for (const track of stream.getTracks()) track.stop();

        status.className = 'success';
        status.innerHTML = '<span class="status-icon">&gt;</span> <span style="color: #4ec9b0;">access granted</span>';
        btn.textContent = '[ done ]';

        setTimeout(() => {
          window.close();
        }, 2000);
      } catch (err) {
        status.className = 'error';
        status.innerHTML = '';
        const icon = document.createElement('span');
        icon.className = 'status-icon';
        icon.textContent = '>';
        const msg = document.createElement('span');
        msg.style.color = '#f44747';
        if (err.name === 'NotAllowedError') {
          msg.textContent = 'error: permission denied';
        } else if (err.name === 'NotFoundError') {
          msg.textContent = 'error: device not found';
        } else {
          msg.textContent = `error: ${err.message}`;
        }
        status.appendChild(icon);
        status.appendChild(document.createTextNode(' '));
        status.appendChild(msg);
        btn.disabled = false;
        btn.textContent = '[ retry ]';
      }
    });
  </script>
</body>
</html>
